<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SafeGuard AI{% endblock %} | Youth & AI Innovation Summit 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'website/css/style.css' %}">
</head>
<body>
    <header class="site-header">
        <nav class="nav-container">
            <a href="{% url 'home' %}" class="logo">
                <span class="logo-icon" aria-hidden="true">🛡️</span>
                <span>SafeGuard AI</span>
            </a>
            <ul class="nav-links">
                <li><a href="#problem">Problem</a></li>
                <li><a href="#solution">Solution</a></li>
                <li><a href="#features">Features</a></li>
                <li><a href="#impact">Impact</a></li>
                <li><a href="#roadmap">Roadmap</a></li>
            </ul>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="footer-content">
            <p>SafeGuard AI — Inclusive Digital Protection for Seniors with Disabilities</p>
            <p class="footer-meta">Youth & AI Innovation Summit 2026 • Assistive Technology / Cybersecurity</p>
        </div>
    </footer>
</body>
</html>
